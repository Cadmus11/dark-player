workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 22
      java: 17
    scripts:
      - npm install
      - npx expo prebuild --platform android --clean
      - cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
