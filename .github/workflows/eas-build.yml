name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile (development, preview, production)
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      platform:
        description: Platform (android, ios, all)
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - run: eas build --profile ${{ inputs.profile || 'preview' }} --platform ${{ inputs.platform || 'android' }} --non-interactive
